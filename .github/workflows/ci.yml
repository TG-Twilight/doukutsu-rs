name: Release Build

on:
  push:
    tags:
      - 'v1.0.0'

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3


      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          targets: aarch64-unknown-linux-gnu


      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu


      - name: Build for Linux arm64
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          cargo build --release --target aarch64-unknown-linux-gnu


      - name: Package the binary
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/doukutsu-rs release/doukutsu-rs-linux-arm64


      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: doukutsu-rs-linux-arm64
          path: release/doukutsu-rs-linux-arm64


  release:
    needs: build-linux-arm64
    runs-on: ubuntu-latest
    steps:

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: doukutsu-rs-linux-arm64
          path: release


      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false


      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/doukutsu-rs-linux-arm64
          asset_name: doukutsu-rs-linux-arm64
          asset_content_type: application/octet-stream
